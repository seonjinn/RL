defaults: ../../grpo_math_1B.yaml
checkpointing:
  checkpoint_dir: results/grpo-qwen3.5-35ba3b-2n8g-automodel-ep16
policy:
  model_name: Qwen/Qwen3.5-35B-A3B-Base
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  dtensor_cfg:
    expert_parallel_size: 16
    activation_checkpointing: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    automodel_kwargs:
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: te
        linear: te
        rms_norm: te
        enable_deepep: true
        fake_balanced_gate: false
        rope_fusion: false
        enable_hf_state_dict_adapter: true
  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true
  generation:
    vllm_cfg:
      tensor_parallel_size: 8
      # set to eager mode to mitigate https://github.com/vllm-project/vllm/issues/36237
      enforce_eager: true
logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3.5-35ba3b-2n8g-automodel-ep16
cluster:
  gpus_per_node: 8
  num_nodes: 2
