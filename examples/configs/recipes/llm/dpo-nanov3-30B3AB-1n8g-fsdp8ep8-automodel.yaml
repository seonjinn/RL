defaults: ../../dpo.yaml
dpo:
  val_period: 50
  max_num_steps: 100
policy:
  model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  tokenizer:
    name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  train_global_batch_size: 16
  train_micro_batch_size: 1
  max_total_sequence_length: 4096
  optimizer:
    kwargs:
      lr: 5.5e-05
  hf_config_overrides:
    router_aux_loss_coef: 0
  dtensor_cfg:
    _v2: true
    expert_parallel_size: 8
    automodel_kwargs:
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: te
        linear: te
        rms_norm: torch_fp32
        experts: torch_mm
        enable_deepep: true
        rope_fusion: false
        enable_hf_state_dict_adapter: true
  offload_optimizer_for_logprob: true
logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: dpo-nanov3-30B3AB-1n8g-fsdp8ep8-automodel
  tensorboard:
    log_dir: tb_logs-dpo-nanov3-30B3AB-1n8g-fsdp8ep8-automodel
  mlflow:
    run_name: dpo-nanov3-30B3AB-1n8g-fsdp8ep8-automodel
cluster:
  gpus_per_node: 8
