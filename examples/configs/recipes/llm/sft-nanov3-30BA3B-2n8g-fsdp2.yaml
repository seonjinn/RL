defaults: ../../sft.yaml
sft:
  max_num_steps: 100
checkpointing:
  enabled: false
policy:
  model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  train_global_batch_size: 16
  max_total_sequence_length: 2048
  optimizer:
    kwargs:
      lr: 1.5e-05
  hf_config_overrides:
    router_aux_loss_coef: 0
  dtensor_cfg:
    expert_parallel_size: 8
    automodel_kwargs:
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: te
        linear: te
        rms_norm: torch_fp32
        experts: torch_mm
        enable_deepep: true
        rope_fusion: false
        enable_hf_state_dict_adapter: true
logger:
  wandb:
    project: nemo-rl
    name: sft-nanov3-30BA3B-2n8g-fsdp2
  tensorboard:
    log_dir: tb_logs-sft-nanov3-30BA3B-2n8g-fsdp2
  mlflow:
    run_name: sft-nanov3-30BA3B-2n8g-fsdp2
cluster:
  gpus_per_node: 8
