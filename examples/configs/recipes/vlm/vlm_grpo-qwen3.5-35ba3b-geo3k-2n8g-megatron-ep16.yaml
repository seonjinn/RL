defaults: ../../vlm_grpo_3B.yaml
grpo:
  num_prompts_per_step: 32
loss_fn:
  reference_policy_kl_penalty: 0.0
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 2
checkpointing:
  checkpoint_dir: results/vlm_grpo-qwen3.5-35ba3b-geo3k-2n8g-megatron-ep16
policy:
  model_name: Qwen/Qwen3.5-35B-A3B-Base
  train_global_batch_size: 512
  logprob_batch_size: 1
  max_total_sequence_length: 3072
  dtensor_cfg:
    enabled: false
  dynamic_batching:
    enabled: false
  megatron_cfg:
    enabled: true
    expert_model_parallel_size: 16
    moe_token_dispatcher_type: allgather
    apply_rope_fusion: false
    activation_checkpointing: true
    defer_fp32_logits: true
    optimizer:
      lr: 1.0e-06
      min_lr: 1.0e-07
      weight_decay: 0.1
      use_precision_aware_optimizer: false
    scheduler:
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-08
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  generation:
    max_new_tokens: 2048
    vllm_cfg:
      tensor_parallel_size: 8
      max_model_len: 3072
data:
  max_input_seq_length: 1024
  train:
    dataset_name: geometry3k
  validation:
    dataset_name: geometry3k
    split: test
  default:
    prompt_file: examples/prompts/geo3k.txt
    env_name: geometry3k
logger:
  wandb_enabled: true
  wandb:
    project: nemo-rl
    name: vlm_grpo-qwen3.5-35ba3b-geo3k-2n8g-megatron-ep16
cluster:
  gpus_per_node: 8
  num_nodes: 2
